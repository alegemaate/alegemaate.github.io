<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Allan Legemaate</title>
    <script>
      // SPA redirect for GitHub Pages: encode the path/query into the
      // querystring and bounce to the root index, where a small snippet
      // restores the URL before Yew boots.
      (function () {
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            "/?p=" +
            encodeURIComponent(l.pathname + l.search) +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
