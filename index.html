    <script>
      // Companion to assets/404.html: if we landed via the GitHub Pages
      // SPA redirect (`/?p=/some/path`), restore the real URL before Yew
      // mounts so client-side routing picks the correct page.
      (function () {
        var q = window.location.search;
        if (q && q.indexOf("?p=") === 0) {
          var path = decodeURIComponent(q.slice(3));
          window.history.replaceState(null, "", path + window.location.hash);
        }
      })();
    </script>
